  <style>
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --ink: #1f2430;
      --muted: #6b7280;
      --line: #e4e7ec;
      --accent: #2f6feb;

      --strong-ink: #1a7f4b;  --strong-bg: #e7f6ee;
      --weak-ink:   #8a5a00;  --weak-bg:   #fbeecb;
      --missing-ink:#b42318;  --missing-bg:#fde7e5;
      --na-ink:     #6b7280;  --na-bg:     #eceef1;

      --band-strong-bg: #1a7f4b;
      --band-mixed-bg:  #b7791f;
      --band-weak-bg:   #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
    }
    a { color: var(--accent); }
    code { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 0.85em; background: #eef1f5; padding: 1px 5px; border-radius: 4px; }

    .topbar {
      position: sticky; top: 0; z-index: 5;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      padding: 14px 24px;
      background: #fff; border-bottom: 1px solid var(--line);
    }
    .topbar .brand { font-weight: 700; font-size: 1.05rem; }
    .topbar .challenge { color: var(--muted); font-size: 0.9rem; }
    .topbar .challenge code { background: #eef1f5; }
    .topbar .spacer { flex: 1; }

    .track-toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .track-toggle button {
      border: 0; background: #fff; color: var(--ink);
      padding: 8px 14px; font-size: 0.88rem; cursor: pointer;
    }
    .track-toggle button + button { border-left: 1px solid var(--line); }
    .track-toggle button[aria-selected="true"] { background: var(--accent); color: #fff; font-weight: 600; }

    main { max-width: 980px; margin: 0 auto; padding: 24px 20px 64px; }
    .section-title { font-size: 1.15rem; font-weight: 700; margin: 30px 0 4px; }
    .section-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 14px; }

    /* Overall */
    .overall {
      background: var(--card); border: 1px solid var(--line); border-radius: 14px;
      padding: 22px; display: grid; grid-template-columns: auto 1fr; gap: 22px; align-items: start;
    }
    .score-dial {
      width: 132px; text-align: center; padding: 16px 10px; border-radius: 12px;
      background: #f8fafc; border: 1px solid var(--line);
    }
    .score-dial .num { font-size: 2.6rem; font-weight: 800; line-height: 1; }
    .score-dial .den { color: var(--muted); font-size: 0.95rem; }
    .band {
      display: inline-block; margin-top: 10px; padding: 3px 12px; border-radius: 999px;
      color: #fff; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
    }
    .band.strong { background: var(--band-strong-bg); }
    .band.mixed  { background: var(--band-mixed-bg); }
    .band.weak   { background: var(--band-weak-bg); }
    .overall .track-label { color: var(--muted); font-size: 0.85rem; margin-bottom: 6px; }
    .overall h1 { font-size: 1.1rem; margin: 0 0 8px; }
    .overall ul.summary { margin: 0; padding-left: 1.15rem; font-size: 0.95rem; }
    .overall ul.summary li { margin: 5px 0; }
    .score-dial .dial-note { margin-top: 8px; font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }

    /* Legend */
    .legend {
      display: flex; flex-wrap: wrap; gap: 10px 18px; align-items: center;
      background: #fff; border: 1px solid var(--line); border-radius: 10px;
      padding: 12px 16px; margin-top: 16px; font-size: 0.86rem;
    }
    .legend .legend-title { font-weight: 600; margin-right: 4px; }
    .legend .item { display: inline-flex; align-items: center; gap: 7px; color: var(--muted); }

    .pill {
      display: inline-block; padding: 2px 9px; border-radius: 999px;
      font-size: 0.74rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; white-space: nowrap;
    }
    .pill.strong  { color: var(--strong-ink);  background: var(--strong-bg); }
    .pill.weak    { color: var(--weak-ink);     background: var(--weak-bg); }
    .pill.missing { color: var(--missing-ink);  background: var(--missing-bg); }
    .pill.na      { color: var(--na-ink);       background: var(--na-bg); }

    /* Rubric card */
    .rubric { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 18px 18px 8px; margin-bottom: 14px; }
    .rubric.is-na { background: #fbfbfc; border-style: dashed; }
    .rubric-head { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; }

    .rubric-head .label { color: var(--muted); font-size: 0.8rem; }
    .rubric-score { text-align: right; white-space: nowrap; }

    .rubric-score .weight { color: var(--muted); font-size: 0.78rem; }
    .na-badge { display: inline-block; padding: 4px 12px; border-radius: 8px; background: var(--na-bg); color: var(--na-ink); font-weight: 700; font-size: 0.82rem; }

    .yardstick { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0 6px; }
    .yardstick .col { border-radius: 8px; padding: 9px 12px; font-size: 0.86rem; }
    .yardstick .good { background: var(--strong-bg); }
    .yardstick .bad  { background: var(--missing-bg); }
    .yardstick .col .k { font-weight: 700; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 2px; }
    .yardstick .good .k { color: var(--strong-ink); }
    .yardstick .bad .k  { color: var(--missing-ink); }

    .na-reason { font-size: 0.86rem; color: var(--muted); font-style: italic; margin: 12px 0 4px; }

    .subpoints { list-style: none; margin: 6px 0 4px; padding: 0; }
    .subpoints li { display: grid; grid-template-columns: 92px 1fr; gap: 12px; padding: 9px 0; border-top: 1px solid var(--line); align-items: start; }
    .subpoints li .sp-body .checks { font-weight: 600; font-size: 0.9rem; }
    .subpoints li .sp-body .detail { color: var(--muted); font-size: 0.86rem; }
    .subpoints li .sp-key { display: block; color: var(--muted); font-size: 0.72rem; margin-top: 4px; }

    .note { margin: 8px 0 4px; padding: 9px 12px; background: #fff8e8; border: 1px solid #f3e2b3; border-radius: 8px; font-size: 0.84rem; color: #7a5a12; }

    /* Bonuses */
    .bonus { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; }
    .bonus-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .bonus-head .title { font-weight: 700; }
    .bonus .lifts { color: var(--muted); font-size: 0.82rem; }
    .bonus .note-plain { font-size: 0.88rem; margin: 8px 0; }

    /* Telemetry */
    details.telemetry { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 4px 18px; margin-top: 8px; }
    details.telemetry summary { cursor: pointer; font-weight: 700; padding: 12px 0; font-size: 1.02rem; }
    .tele-group-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin: 14px 0 6px; font-weight: 700; }
    table.tele { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    table.tele th, table.tele td { text-align: left; padding: 8px 10px; border-top: 1px solid var(--line); vertical-align: top; }
    table.tele th { color: var(--muted); font-weight: 600; font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.03em; border-top: 0; }
    table.tele td.val { font-weight: 600; white-space: nowrap; }
    table.tele tr.is-na td { color: var(--na-ink); }
    table.tele td .src { color: var(--muted); }

    footer.refnote { max-width: 980px; margin: 24px auto 0; padding: 0 20px; color: var(--muted); font-size: 0.8rem; }

    @media (max-width: 720px) {
      .overall { grid-template-columns: 1fr; }
      .yardstick { grid-template-columns: 1fr; }
      .subpoints li { grid-template-columns: 80px 1fr; }
    }
  </style>

    /* ----------------------------------------------------------------------
       RENDERER. Generic — drive it entirely from REPORT_DATA above.
       ---------------------------------------------------------------------- */
    const VERDICT_LABEL = { strong: "Strong", weak: "Weak", missing: "Missing", na: "N/A" };
    let currentTrack = "vibe";

    const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    function pill(verdict) {
      return `<span class="pill ${esc(verdict)}">${esc(VERDICT_LABEL[verdict] || verdict)}</span>`;
    }

    function legendHtml(legend) {
      const items = legend.verdicts.map(v =>
        `<span class="item">${pill(v.key)} ${esc(v.definition)}</span>`).join("");
      return `<div class="legend"><span class="legend-title">How to read a verdict:</span>${items}</div>`;
    }

    function subpointsHtml(subpoints) {
      if (!subpoints || !subpoints.length) return "";
      const rows = subpoints.map(sp => `
        <li>
          <span>${pill(sp.verdict)}</span>
          <span class="sp-body">
            <span class="checks">${esc(sp.checks)}</span>
            ${sp.detail ? `<span class="detail"> — ${esc(sp.detail)}</span>` : ""}
            <span class="sp-key"><code>${esc(sp.key)}</code></span>
          </span>
        </li>`).join("");
      return `<ul class="subpoints">${rows}</ul>`;
    }

    function rubricHtml(r) {
      const isNa = r.applies === false;
      // Scores arrive from the grader already on a 0-100 scale (r.score, with r.out_of = 100);
      // the page prints them as-is — no arithmetic — so the overall total reads as their weighted average.
      const scoreBlock = isNa
        ? `<span class="na-badge">N/A</span><div class="weight">not counted</div>`
        : `<div class="val">${esc(r.score)}<span class="den"> / ${esc(r.out_of)}</span></div>
           <div class="weight">weight ${esc(r.weight)}%</div>`;

      return `
        <article class="rubric ${isNa ? "is-na" : ""}">
          <div class="rubric-head">
            <div>
              <p class="title">${esc(r.title)}</p>
              <span class="label"><code>${esc(r.label)}</code> · ${esc(r.kind === "llm" ? "LLM-judged" : "deterministic")}</span>
            </div>
            <div class="rubric-score">${scoreBlock}</div>
          </div>
          <div class="yardstick">
            <div class="col good"><span class="k">Good</span>${esc(r.good)}</div>
            <div class="col bad"><span class="k">Bad</span>${esc(r.bad)}</div>
          </div>
          ${isNa && r.na_reason ? `<p class="na-reason">${esc(r.na_reason)}</p>` : ""}
          ${subpointsHtml(r.subpoints)}
          ${r.note ? `<p class="note">${esc(r.note)}</p>` : ""}
        </article>`;
    }

    function sectionHtml(sec) {
      return `
        <h2 class="section-title">${esc(sec.title)}</h2>
        <p class="section-sub">${esc(sec.subtitle)}</p>
        ${sec.rubrics.map(rubricHtml).join("")}`;
    }

    function bonusHtml(b) {
      return `
        <div class="bonus">
          <div class="bonus-head">
            <span class="title">${esc(b.title)}</span>
            <span>${b.attempted ? pill("strong") : pill("na")} <span class="lifts">lifts ${esc(b.lifts)}</span></span>
          </div>
          <p class="note-plain">${esc(b.note)}</p>
          ${subpointsHtml(b.subpoints)}
        </div>`;
    }

    function telemetryHtml(rows) {
      const groups = [
        { key: "both", title: "Shared — both tracks" },
        { key: "vibe", title: "AI collaboration — vibe coding only" }
      ];
      const body = groups.map(g => {
        const rs = rows.filter(r => r.track === g.key);
        if (!rs.length) return "";
        const trs = rs.map(r => `
          <tr class="${r.applies === false ? "is-na" : ""}">
            <td>${esc(r.name)}<div class="src"><code>${esc(r.source)}</code></div></td>
            <td class="val">${r.applies === false ? '<span class="pill na">N/A</span>' : esc(r.value)}</td>
            <td>${esc(r.detail)}</td>
          </tr>`).join("");
        return `
          <div class="tele-group-title">${esc(g.title)}</div>
          <table class="tele">
            <thead><tr><th>Signal</th><th>Value</th><th>Detail</th></tr></thead>
            <tbody>${trs}</tbody>
          </table>`;
      }).join("");
      return `<details class="telemetry" open><summary>Telemetry — the raw signals behind the scores</summary>${body}</details>`;
    }

    function render() {
      const rep = REPORT_DATA.reports[currentTrack];
      document.getElementById("challenge-name").textContent = REPORT_DATA.meta.challenge;
      const o = rep.overall;
      const html = `
        <section class="overall">
          <div class="score-dial">
            <div class="num">${esc(o.score)}</div>
            <div class="den">/ ${esc(o.out_of)}</div>
            <span class="band ${esc(o.band)}">${esc(o.band)}</span>
            <div class="dial-note">weighted average</div>
          </div>
          <div>
            <div class="track-label">Track: ${esc(rep.track_label)}</div>
            <h1>Why this score</h1>
            <ul class="summary">${(o.summary_points || []).map(p => `<li>${esc(p)}</li>`).join("")}</ul>
            ${legendHtml(REPORT_DATA.legend)}
          </div>
        </section>
        ${rep.sections.map(sectionHtml).join("")}
        <h2 class="section-title">Bonuses</h2>
        <p class="section-sub">Optional credit that can only lift a score, never lower it.</p>
        ${rep.bonuses.map(bonusHtml).join("")}
        ${telemetryHtml(rep.telemetry)}`;
      document.getElementById("report").innerHTML = html;

      document.querySelectorAll("#track-toggle button").forEach(btn =>
        btn.setAttribute("aria-selected", String(btn.dataset.track === currentTrack)));
    }

    document.getElementById("track-toggle").addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;
      currentTrack = btn.dataset.track;
      render();
    });

    render();
  </script>
