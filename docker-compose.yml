services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./extension:/app/extension:ro
    env_file: .env
    environment:
      DB_PATH: /app/data/vibe.db
      CHALLENGES_DIR: /app/challenges
      VIBE_LOG_DIR: /app/data/logs
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    # Default Docker seccomp profile + `personality` allowed, so the grader's
    # `setarch -R` can disable ASLR for ThreadSanitizer (otherwise it dies with
    # EPERM and every test reports failed). All other syscalls stay filtered.
    security_opt:
      - seccomp=./worker/seccomp.json
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      DB_PATH: /app/data/vibe.db
      CHALLENGES_DIR: /app/challenges
      VIBE_LOG_DIR: /app/data/logs
    depends_on:
      - backend
    restart: unless-stopped
